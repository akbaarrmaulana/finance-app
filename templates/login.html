{% extends "layout.html" %}

{% block title %}Login - FinTracker Modern{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-3xl p-8 sm:p-12 shadow-2xl border border-glass-border">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold font-display tracking-tight mb-2">Welcome Back</h1>
                <p class="text-gray-400 text-sm">Sign in to access your financial dashboard</p>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
                    <input type="email" name="email" id="email" required
                        class="w-full bg-black/40 border border-glass-border focus:border-brand-500 outline-none rounded-xl px-4 py-3 text-white transition-all duration-200"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label for="password" class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Password</label>
                    <input type="password" name="password" id="password" required
                        class="w-full bg-black/40 border border-glass-border focus:border-brand-500 outline-none rounded-xl px-4 py-3 text-white transition-all duration-200"
                        placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between text-xs">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-glass-border bg-black/40 text-brand-500">
                        <label for="remember" class="ml-2 text-gray-400">Remember me</label>
                    </div>
                    <a href="#" class="text-brand-500 hover:text-brand-100 transition-colors">Forgot password?</a>
                </div>

                <button type="submit" 
                    class="w-full btn-futuristic text-white py-4 rounded-xl font-bold text-lg shadow-neon transform active:scale-95 transition-all">
                    Login Now
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-glass-border text-center">
                <p class="text-sm text-gray-400 font-medium">
                    Don't have an account? 
                    <a href="/register" class="text-brand-500 hover:underline">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
