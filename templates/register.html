{% extends "layout.html" %}

{% block title %}Sign Up - FinTracker Modern{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[65vh] py-8">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-3xl p-8 sm:p-12 shadow-2xl border border-glass-border">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold font-display tracking-tight mb-2">Create Account</h1>
                <p class="text-gray-400 text-sm italic italic tracking-tight">Join the futuristic way of managing your finances</p>
            </div>

            <form action="/register" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Full Username</label>
                    <input type="text" name="username" id="username" required
                        class="w-full bg-black/40 border border-glass-border focus:border-brand-500 outline-none rounded-xl px-4 py-3 text-white transition-all duration-200"
                        placeholder="akbarrmaulana">
                </div>

                <div>
                    <label for="email" class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
                    <input type="email" name="email" id="email" required
                        class="w-full bg-black/40 border border-glass-border focus:border-brand-500 outline-none rounded-xl px-4 py-3 text-white transition-all duration-200"
                        placeholder="your@email.com">
                    <p class="text-[10px] text-gray-500 mt-2 px-1 tracking-tight italic flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                        You'll need to confirm your email after signing up.
                    </p>
                </div>

                <div>
                    <label for="password" class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Password</label>
                    <input type="password" name="password" id="password" required
                        class="w-full bg-black/40 border border-glass-border focus:border-brand-500 outline-none rounded-xl px-4 py-3 text-white transition-all duration-200"
                        placeholder="Min. 8 characters">
                </div>

                <div class="flex items-center text-xs gap-2 py-1">
                    <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-glass-border bg-black/40 text-brand-500">
                    <label for="terms" class="text-gray-400">I agree to the <a href="#" class="text-brand-500 underline">Terms and Conditions</a></label>
                </div>

                <button type="submit" 
                    class="w-full btn-futuristic text-white py-4 rounded-xl font-bold text-lg shadow-neon transform active:scale-95 transition-all">
                    Register Now
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-glass-border text-center">
                <p class="text-sm text-gray-400 font-medium">
                    Already have an account? 
                    <a href="/login" class="text-brand-500 hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
